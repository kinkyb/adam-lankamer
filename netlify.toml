[[redirects]]
  from = "/translatea"
  to   = "/translatea.html"
  status = 200

[[redirects]]
  from = "/fotostories"
  to   = "/fotostories.html"
  status = 200

[[redirects]]
  from = "/ai"
  to   = "/ai.html"
  status = 200

[[redirects]]
  from = "/ai/website-development"
  to   = "/ai/website-development.html"
  status = 200

[build]
  publish = "."

# Security + privacy headers — applied to every response
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "interest-cohort=(), browsing-topics=(), camera=(), microphone=(), geolocation=()"
    X-Frame-Options = "SAMEORIGIN"

# Long-cache static assets — content-hashed by Netlify edge
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.webp"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/favicon*"
  [headers.values]
    Cache-Control = "public, max-age=604800"
